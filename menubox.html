<!doctype html>
<html>
  <head>
    <title>Melina's</title>
    <style>

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin-top: 40px;

      }

      .box {
        background-color: black;
        height: 400px;

      }

      }

      }

  <body>
    <div class="box">

        I’m a dish description. Click “Edit Menu” to open the Restaurant Menu

      </p>

      ><br />
